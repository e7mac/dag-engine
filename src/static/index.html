<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAG Workflow Engine</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<div class="layout">
  <!-- Header -->
  <header>
    <h1><span>DAG</span> Workflow Engine</h1>
    <div class="spacer"></div>
    <button class="sm stats-toggle" id="stats-toggle" onclick="UI.toggleStats()">Stats</button>
    <button class="sm" onclick="UI.openRegisterModal()">+ Register Workflow</button>
    <button class="sm" onclick="Workflow.loadExample('order_fulfillment')">Load Order Example</button>
    <button class="sm" onclick="Workflow.loadExample('email_validation')">Load Email Example</button>
    <button class="sm" onclick="Workflow.loadExample('user_lookup')">Load User Lookup</button>
    <button class="sm" onclick="Workflow.loadExample('fault_tolerance')">Load Fault Test</button>
    <button class="sm" onclick="Workflow.loadExample('resume_test')">Load Resume Test</button>
  </header>

  <!-- Stats Panel -->
  <div class="stats-panel" id="stats-panel">
    <div class="stats-bar" id="stats-bar">
      <div style="font-size:12px;color:var(--text-dim)">No stats yet — run a workflow first</div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>Workflows</h3>
      <div id="workflow-list"></div>
    </div>
    <div class="sidebar-section" style="border-top:1px solid var(--border)">
      <h3>Runs</h3>
      <div id="run-list"></div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="toolbar" id="toolbar" style="display:none">
      <span class="title" id="workflow-title"></span>
      <button class="sm" onclick="Workflow.validate()">Validate</button>
      <button class="sm" onclick="UI.openRunModal()">Run Sandbox</button>
      <button class="sm" onclick="UI.openRunModal(true)">Run Live</button>
      <div id="validation-box"></div>
    </div>
    <div class="canvas-wrap" id="canvas-wrap">
      <div class="empty-state" id="empty-state">
        <div class="icon">&#9653;</div>
        <div>Select or register a workflow to begin</div>
      </div>
      <canvas id="dag-canvas" style="display:none"></canvas>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="panel-header">Execution Trace</div>
    <div class="context-editor" id="context-editor" style="display:none">
      <label>Initial Context (JSON)</label>
      <textarea id="context-input">{}</textarea>
    </div>
    <div class="trace-list" id="trace-list">
      <div class="empty-state" style="font-size:12px;padding:20px">
        Run a workflow to see the execution trace
      </div>
    </div>
  </div>
</div>

<!-- Register Modal -->
<div class="modal-overlay" id="register-modal" style="display:none" onclick="if(event.target===this)UI.closeModal('register-modal')">
  <div class="modal">
    <div class="modal-header">
      Register Workflow
      <button class="sm" onclick="UI.closeModal('register-modal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Workflow Definition (JSON)</label>
        <textarea id="register-json" rows="18" placeholder='Paste workflow JSON here...'></textarea>
      </div>
      <div id="register-error" style="color:var(--red);font-size:12px;display:none"></div>
    </div>
    <div class="modal-footer">
      <button onclick="UI.closeModal('register-modal')">Cancel</button>
      <button class="primary" onclick="Workflow.register()">Register</button>
    </div>
  </div>
</div>

<!-- Run Modal -->
<div class="modal-overlay" id="run-modal" style="display:none" onclick="if(event.target===this)UI.closeModal('run-modal')">
  <div class="modal" style="width:450px">
    <div class="modal-header">
      Run Workflow
      <button class="sm" onclick="UI.closeModal('run-modal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Initial Context (JSON)</label>
        <textarea id="run-context" rows="6">{}</textarea>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="run-sandbox" checked>
        <label for="run-sandbox" style="margin:0">Sandbox mode (use mocks)</label>
      </div>
      <div id="run-error" style="color:var(--red);font-size:12px;display:none;margin-top:8px"></div>
    </div>
    <div class="modal-footer">
      <button onclick="UI.closeModal('run-modal')">Cancel</button>
      <button class="primary" onclick="Runner.execute()">Run</button>
    </div>
  </div>
</div>

<!-- Scripts loaded in dependency order -->
<script src="/static/js/state.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/ui.js"></script>
<script src="/static/js/dag.js"></script>
<script src="/static/js/trace.js"></script>
<script src="/static/js/sidebar.js"></script>
<script src="/static/js/workflow.js"></script>
<script src="/static/js/runner.js"></script>
<script src="/static/js/init.js"></script>
</body>
</html>
