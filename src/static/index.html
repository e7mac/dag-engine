<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAG Workflow Engine</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --border: #2e3345;
  --text: #e1e4ed;
  --text-dim: #8b90a0;
  --accent: #6c8cff;
  --accent-dim: #3d5299;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  --blue: #60a5fa;
  --purple: #a78bfa;
  --radius: 8px;
  --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}
button {
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  padding: 6px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  transition: background 0.15s;
}
button:hover { background: var(--accent-dim); border-color: var(--accent); }
button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
button.primary:hover { background: #5a7ae6; }
button.sm { padding: 4px 10px; font-size: 12px; }

.layout {
  display: grid;
  grid-template-columns: 260px 1fr 340px;
  grid-template-rows: 48px 1fr;
  height: 100vh;
}

/* --- Header --- */
header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  padding: 0 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
header h1 span { color: var(--accent); }
header .spacer { flex: 1; }

/* --- Sidebar --- */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.sidebar-section { padding: 12px; }
.sidebar-section h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.sidebar-item {
  padding: 8px 10px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.1s;
}
.sidebar-item:hover { background: var(--surface2); }
.sidebar-item.active { background: var(--accent-dim); color: #fff; }
.sidebar-item .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sidebar-item .meta {
  font-size: 11px;
  color: var(--text-dim);
  margin-left: auto;
}
.run-status-completed { background: var(--green); }
.run-status-failed { background: var(--red); }
.run-status-running { background: var(--yellow); }
.run-status-pending { background: var(--text-dim); }

/* --- Main Panel --- */
.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.toolbar .title { font-size: 14px; font-weight: 600; margin-right: 8px; }
.canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.canvas-wrap canvas {
  display: block;
  width: 100%;
  height: 100%;
}
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-dim);
  gap: 12px;
  font-size: 14px;
}
.empty-state .icon { font-size: 48px; opacity: 0.3; }

/* --- Right Panel (trace) --- */
.right-panel {
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.panel-header {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.trace-list { padding: 8px 0; flex: 1; overflow-y: auto; }
.trace-node {
  display: flex;
  align-items: flex-start;
  padding: 8px 14px;
  gap: 10px;
  font-size: 13px;
}
.trace-line {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 20px;
  flex-shrink: 0;
}
.trace-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 2px solid var(--border);
  flex-shrink: 0;
}
.trace-dot.success { background: var(--green); border-color: var(--green); }
.trace-dot.failed { background: var(--red); border-color: var(--red); }
.trace-dot.running { background: var(--yellow); border-color: var(--yellow); }
.trace-dot.pending { background: var(--surface2); }
.trace-connector {
  width: 2px;
  flex: 1;
  min-height: 16px;
  background: var(--border);
}
.trace-info { flex: 1; }
.trace-info .node-label { font-weight: 500; }
.trace-info .node-meta {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}
.trace-info .branch-badge {
  display: inline-block;
  background: var(--accent-dim);
  color: var(--accent);
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 10px;
  margin-left: 4px;
}

/* --- Modal --- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 600px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
}
.modal-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-body { padding: 18px; overflow-y: auto; flex: 1; }
.modal-footer {
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
textarea, input[type="text"] {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 10px;
  resize: vertical;
}
textarea:focus, input[type="text"]:focus {
  outline: none;
  border-color: var(--accent);
}
label { font-size: 12px; color: var(--text-dim); display: block; margin-bottom: 4px; }
.form-group { margin-bottom: 14px; }
.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
}
.checkbox-row input[type="checkbox"] { accent-color: var(--accent); }

/* --- Validation result --- */
.validation-result {
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  margin-top: 8px;
}
.validation-result.valid { background: rgba(74,222,128,0.1); color: var(--green); }
.validation-result.invalid { background: rgba(248,113,113,0.1); color: var(--red); }
.validation-result ul { margin-top: 6px; padding-left: 18px; }

/* --- Context editor in right panel --- */
.context-editor {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}
.context-editor textarea {
  height: 80px;
  font-size: 11px;
}

/* --- Toast --- */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 10px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  z-index: 200;
  animation: fadeIn 0.2s;
}
.trace-node[data-node-id] { cursor: pointer; transition: background 0.15s; }
.trace-node.highlight { background: var(--surface2); }

/* --- Trace detail sections --- */
.trace-toggle {
  font-size: 11px;
  color: var(--accent);
  cursor: pointer;
  margin-top: 4px;
}
.trace-toggle:hover { text-decoration: underline; }
.trace-detail { margin-top: 6px; }
.detail-section { margin-bottom: 6px; }
.detail-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  display: block;
  margin-bottom: 2px;
}
.detail-json {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 200px;
  overflow-y: auto;
  margin: 0;
}

/* --- Stats Panel --- */
.stats-panel {
  grid-column: 1 / -1;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: none;
  animation: fadeIn 0.2s;
}
.stats-panel.visible { display: block; }
.stats-bar {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  flex-wrap: wrap;
}
.stat-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 16px;
  min-width: 120px;
}
.stat-card .stat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.stat-card .stat-value {
  font-size: 20px;
  font-weight: 700;
  font-family: var(--mono);
}
.stat-card .stat-sub {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}
.stat-value.green { color: var(--green); }
.stat-value.yellow { color: var(--yellow); }
.stat-value.red { color: var(--red); }
.per-wf-table {
  font-size: 12px;
  border-collapse: collapse;
  margin-top: 4px;
}
.per-wf-table th, .per-wf-table td {
  padding: 3px 10px 3px 0;
  text-align: left;
  white-space: nowrap;
}
.per-wf-table th {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  font-weight: 500;
}
button.stats-toggle.active { background: var(--accent-dim); border-color: var(--accent); }

.toast.error { border-color: var(--red); color: var(--red); }
.toast.success { border-color: var(--green); color: var(--green); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="layout">
  <!-- Header -->
  <header>
    <h1><span>DAG</span> Workflow Engine</h1>
    <div class="spacer"></div>
    <button class="sm stats-toggle" id="stats-toggle" onclick="toggleStats()">Stats</button>
    <button class="sm" onclick="openRegisterModal()">+ Register Workflow</button>
    <button class="sm" onclick="loadExample('order_fulfillment')">Load Order Example</button>
    <button class="sm" onclick="loadExample('email_validation')">Load Email Example</button>
    <button class="sm" onclick="loadExample('user_lookup')">Load User Lookup</button>
    <button class="sm" onclick="loadExample('fault_tolerance')">Load Fault Test</button>
  </header>

  <!-- Stats Panel -->
  <div class="stats-panel" id="stats-panel">
    <div class="stats-bar" id="stats-bar">
      <div style="font-size:12px;color:var(--text-dim)">No stats yet — run a workflow first</div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>Workflows</h3>
      <div id="workflow-list"></div>
    </div>
    <div class="sidebar-section" style="border-top:1px solid var(--border)">
      <h3>Runs</h3>
      <div id="run-list"></div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="toolbar" id="toolbar" style="display:none">
      <span class="title" id="workflow-title"></span>
      <button class="sm" onclick="validateWorkflow()">Validate</button>
      <button class="sm" onclick="openRunModal()">Run Sandbox</button>
      <button class="sm" onclick="openRunModal(true)">Run Live</button>
      <div id="validation-box"></div>
    </div>
    <div class="canvas-wrap" id="canvas-wrap">
      <div class="empty-state" id="empty-state">
        <div class="icon">&#9653;</div>
        <div>Select or register a workflow to begin</div>
      </div>
      <canvas id="dag-canvas" style="display:none"></canvas>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="panel-header">Execution Trace</div>
    <div class="context-editor" id="context-editor" style="display:none">
      <label>Initial Context (JSON)</label>
      <textarea id="context-input">{}</textarea>
    </div>
    <div class="trace-list" id="trace-list">
      <div class="empty-state" style="font-size:12px;padding:20px">
        Run a workflow to see the execution trace
      </div>
    </div>
  </div>
</div>

<!-- Register Modal -->
<div class="modal-overlay" id="register-modal" style="display:none" onclick="if(event.target===this)closeModal('register-modal')">
  <div class="modal">
    <div class="modal-header">
      Register Workflow
      <button class="sm" onclick="closeModal('register-modal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Workflow Definition (JSON)</label>
        <textarea id="register-json" rows="18" placeholder='Paste workflow JSON here...'></textarea>
      </div>
      <div id="register-error" style="color:var(--red);font-size:12px;display:none"></div>
    </div>
    <div class="modal-footer">
      <button onclick="closeModal('register-modal')">Cancel</button>
      <button class="primary" onclick="registerWorkflow()">Register</button>
    </div>
  </div>
</div>

<!-- Run Modal -->
<div class="modal-overlay" id="run-modal" style="display:none" onclick="if(event.target===this)closeModal('run-modal')">
  <div class="modal" style="width:450px">
    <div class="modal-header">
      Run Workflow
      <button class="sm" onclick="closeModal('run-modal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Initial Context (JSON)</label>
        <textarea id="run-context" rows="6">{}</textarea>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="run-sandbox" checked>
        <label for="run-sandbox" style="margin:0">Sandbox mode (use mocks)</label>
      </div>
      <div id="run-error" style="color:var(--red);font-size:12px;display:none;margin-top:8px"></div>
    </div>
    <div class="modal-footer">
      <button onclick="closeModal('run-modal')">Cancel</button>
      <button class="primary" onclick="executeRun()">Run</button>
    </div>
  </div>
</div>

<script>
// --- State ---
let workflows = {};
let runs = [];
let selectedWorkflowId = null;
let selectedRunId = null;
let pollTimer = null;
let highlightedNodeId = null;
let lastDAGArgs = { wf: null, trace: null };

// --- Examples (embedded) ---
const EXAMPLES = {
  order_fulfillment: {"id":"order-fulfillment","name":"Order Fulfillment","version":1,"start_node_id":"check_inventory","nodes":{"check_inventory":{"id":"check_inventory","type":"third_party","label":"Check Inventory","config":{"url":"https://httpbin.org/post","method":"POST","body":{"sku":"{{context.sku}}"},"retry":{"max_attempts":3,"backoff_ms":500},"mock":{"status":200,"body":{"in_stock":true}}},"next":"branch_in_stock"},"branch_in_stock":{"id":"branch_in_stock","type":"branch","label":"In Stock?","edges":[{"label":"yes","condition":{"field":"nodes.check_inventory.response.in_stock","operator":"equals","value":true},"next":"create_shipment"},{"label":"no","condition":{"field":"nodes.check_inventory.response.in_stock","operator":"equals","value":false},"next":"end_cancelled"}]},"create_shipment":{"id":"create_shipment","type":"third_party","label":"Create Shipment","config":{"url":"https://httpbin.org/post","method":"POST","mock":{"status":200,"body":{"shipment_id":"SHP-123"}}},"next":"end_success"},"end_success":{"id":"end_success","type":"end","label":"Order Fulfilled"},"end_cancelled":{"id":"end_cancelled","type":"end","label":"Cancelled"}}},
  email_validation: {"id":"email-validation","name":"Email Validation Pipeline","version":1,"start_node_id":"validate_email","nodes":{"validate_email":{"id":"validate_email","type":"third_party","label":"Validate Email","config":{"url":"https://httpbin.org/post","method":"POST","body":{"email":"{{context.email}}"},"retry":{"max_attempts":2,"backoff_ms":500},"mock":{"status":200,"body":{"valid":true}}},"next":"email_valid"},"email_valid":{"id":"email_valid","type":"branch","label":"Email Valid?","edges":[{"label":"yes","condition":{"field":"nodes.validate_email.response.valid","operator":"equals","value":true},"next":"check_ip"},{"label":"no","condition":{"field":"nodes.validate_email.response.valid","operator":"equals","value":false},"next":"end_rejected"}]},"check_ip":{"id":"check_ip","type":"third_party","label":"Check IP Risk","config":{"url":"https://httpbin.org/post","method":"POST","body":{"ip":"{{context.ip}}"},"retry":{"max_attempts":2,"backoff_ms":500},"mock":{"status":200,"body":{"risk_score":"low"}}},"next":"risk_level"},"risk_level":{"id":"risk_level","type":"branch","label":"Risk Level?","edges":[{"label":"low","condition":{"field":"nodes.check_ip.response.risk_score","operator":"equals","value":"low"},"next":"send_welcome"},{"label":"medium","condition":{"field":"nodes.check_ip.response.risk_score","operator":"equals","value":"medium"},"next":"trigger_sms"},{"label":"high","condition":{"field":"nodes.check_ip.response.risk_score","operator":"equals","value":"high"},"next":"log_security"}]},"send_welcome":{"id":"send_welcome","type":"third_party","label":"Send Welcome Email","config":{"url":"https://httpbin.org/post","method":"POST","body":{"to":"{{context.email}}","template":"welcome"},"mock":{"status":200,"body":{"sent":true}}},"next":"end_success"},"trigger_sms":{"id":"trigger_sms","type":"third_party","label":"Trigger SMS Verification","config":{"url":"https://httpbin.org/post","method":"POST","body":{"phone":"{{context.phone}}"},"mock":{"status":200,"body":{"sms_sent":true}}},"next":"end_pending"},"log_security":{"id":"log_security","type":"third_party","label":"Log Security Event","config":{"url":"https://httpbin.org/post","method":"POST","body":{"event":"high_risk_signup","email":"{{context.email}}"},"mock":{"status":200,"body":{"logged":true}}},"next":"end_blocked"},"end_success":{"id":"end_success","type":"end","label":"Signup Successful"},"end_pending":{"id":"end_pending","type":"end","label":"Pending SMS Verification"},"end_blocked":{"id":"end_blocked","type":"end","label":"Blocked \u2014 High Risk"},"end_rejected":{"id":"end_rejected","type":"end","label":"Rejected \u2014 Invalid Email"}}},
  user_lookup: {"id":"user-lookup","name":"User Lookup Pipeline","version":1,"start_node_id":"fetch_user","nodes":{"fetch_user":{"id":"fetch_user","type":"third_party","label":"Fetch User","config":{"url":"https://jsonplaceholder.typicode.com/users/{{context.user_id}}","method":"GET","timeout_ms":10000,"retry":{"max_attempts":2,"backoff_ms":1000},"mock":{"status":200,"body":{"id":1,"name":"Leanne Graham","company":{"name":"Romaguera-Crona"}}}},"next":"fetch_posts"},"fetch_posts":{"id":"fetch_posts","type":"third_party","label":"Fetch User Posts","config":{"url":"https://jsonplaceholder.typicode.com/posts?userId={{context.user_id}}","method":"GET","timeout_ms":10000,"retry":{"max_attempts":2,"backoff_ms":1000},"mock":{"status":200,"body":[{"id":1,"title":"Post 1"},{"id":2,"title":"Post 2"}]}},"next":"check_activity"},"check_activity":{"id":"check_activity","type":"branch","label":"Active User?","edges":[{"label":"active","condition":{"field":"nodes.fetch_posts.response.0.id","operator":"exists"},"next":"end_active"}],"default_next":"end_inactive"},"end_active":{"id":"end_active","type":"end","label":"Active User"},"end_inactive":{"id":"end_inactive","type":"end","label":"Inactive User"}}},
  fault_tolerance: {"id":"fault-tolerance-test","name":"Fault Tolerance Test","version":1,"start_node_id":"flaky_call","nodes":{"flaky_call":{"id":"flaky_call","type":"third_party","label":"Flaky API (fails 2x, then OK)","config":{"url":"http://localhost:8000/test/flaky?fail_count=2","method":"GET","timeout_ms":5000,"retry":{"max_attempts":3,"backoff_ms":500},"mock":{"status":200,"body":{"status":"ok","message":"Recovered after retries"}}},"next":"check_result"},"check_result":{"id":"check_result","type":"branch","label":"Success?","edges":[{"label":"recovered","condition":{"field":"nodes.flaky_call.response.status","operator":"equals","value":"ok"},"next":"end_ok"}],"default_next":"end_fail"},"end_ok":{"id":"end_ok","type":"end","label":"Recovered!"},"end_fail":{"id":"end_fail","type":"end","label":"Failed After Retries"}}}
};

// --- Extract required context variables from a workflow ---
function extractContextVars(wf) {
  const vars = new Set();
  const re = /\{\{context\.([^}]+)\}\}/g;
  JSON.stringify(wf).replace(re, (_, v) => { vars.add(v.trim()); });
  return [...vars];
}

function buildDefaultContext(wf) {
  const vars = extractContextVars(wf);
  if (vars.length === 0) return '{}';
  const obj = {};
  vars.forEach(v => { obj[v] = 'example_' + v; });
  return JSON.stringify(obj, null, 2);
}

// --- API helpers ---
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    ...opts,
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(typeof body.detail === 'string' ? body.detail : JSON.stringify(body.detail));
  }
  return res.json();
}

// --- Toast ---
function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// --- Modal ---
function openRegisterModal() {
  document.getElementById('register-json').value = '';
  document.getElementById('register-error').style.display = 'none';
  document.getElementById('register-modal').style.display = 'flex';
}
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

function openRunModal(live = false) {
  if (!selectedWorkflowId) return;
  document.getElementById('run-sandbox').checked = !live;
  document.getElementById('run-context').value = document.getElementById('context-input').value;
  document.getElementById('run-error').style.display = 'none';
  document.getElementById('run-modal').style.display = 'flex';
}

// --- Register Workflow ---
async function registerWorkflow() {
  const textarea = document.getElementById('register-json');
  const errEl = document.getElementById('register-error');
  let json;
  try {
    json = JSON.parse(textarea.value);
  } catch (e) {
    errEl.textContent = 'Invalid JSON: ' + e.message;
    errEl.style.display = 'block';
    return;
  }
  try {
    const wf = await api('/workflows', { method: 'POST', body: JSON.stringify(json) });
    workflows[wf.id] = wf;
    closeModal('register-modal');
    renderWorkflowList();
    selectWorkflow(wf.id);
    toast('Workflow registered', 'success');
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}

// --- Load example ---
async function loadExample(name) {
  const json = EXAMPLES[name];
  try {
    const wf = await api('/workflows', { method: 'POST', body: JSON.stringify(json) });
    workflows[wf.id] = wf;
    renderWorkflowList();
    selectWorkflow(wf.id);
    toast(`Loaded ${json.name}`, 'success');
  } catch (e) {
    toast(e.message, 'error');
  }
}

// --- Fetch data ---
async function fetchWorkflows() {
  try {
    const list = await api('/workflows');
    workflows = {};
    list.forEach(w => workflows[w.id] = w);
    renderWorkflowList();
  } catch (e) { /* server may not be running */ }
}

async function fetchRuns() {
  try {
    runs = await api('/runs');
    renderRunList();
  } catch (e) { /* ignore */ }
}

// --- Render sidebar ---
function renderWorkflowList() {
  const el = document.getElementById('workflow-list');
  const ids = Object.keys(workflows);
  if (ids.length === 0) {
    el.innerHTML = '<div style="font-size:12px;color:var(--text-dim);padding:4px">No workflows registered</div>';
    return;
  }
  el.innerHTML = ids.map(id => {
    const w = workflows[id];
    const nodeCount = Object.keys(w.nodes).length;
    const active = id === selectedWorkflowId ? ' active' : '';
    return `<div class="sidebar-item${active}" onclick="selectWorkflow('${id}')">
      <div class="dot" style="background:var(--accent)"></div>
      <span>${esc(w.name)}</span>
      <span class="meta">${nodeCount}n</span>
    </div>`;
  }).join('');
}

function renderRunList() {
  const el = document.getElementById('run-list');
  if (runs.length === 0) {
    el.innerHTML = '<div style="font-size:12px;color:var(--text-dim);padding:4px">No runs yet</div>';
    return;
  }
  el.innerHTML = runs.slice().reverse().map(r => {
    const active = r.run_id === selectedRunId ? ' active' : '';
    const short = r.run_id.slice(0, 8);
    return `<div class="sidebar-item${active}" onclick="selectRun('${r.run_id}')">
      <div class="dot run-status-${r.status}"></div>
      <span>${short}...</span>
      <span class="meta">${r.status}</span>
    </div>`;
  }).join('');
}

// --- Select workflow ---
function selectWorkflow(id) {
  selectedWorkflowId = id;
  selectedRunId = null;
  const wf = workflows[id];
  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('workflow-title').textContent = wf.name + ' v' + wf.version;
  document.getElementById('validation-box').innerHTML = '';
  document.getElementById('context-editor').style.display = 'block';
  document.getElementById('context-input').value = buildDefaultContext(wf);
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('dag-canvas').style.display = 'block';
  renderWorkflowList();
  renderRunList();
  clearTrace();
  drawDAG(wf);
}

// --- Select run ---
async function selectRun(runId) {
  selectedRunId = runId;
  renderRunList();
  try {
    const [trace, fullRun] = await Promise.all([
      api(`/runs/${runId}/trace`),
      api(`/runs/${runId}`),
    ]);
    renderTrace(trace, fullRun);
    // Also select the workflow if it exists
    const run = runs.find(r => r.run_id === runId);
    if (run && workflows[run.workflow_id]) {
      selectedWorkflowId = run.workflow_id;
      const wf = workflows[run.workflow_id];
      document.getElementById('toolbar').style.display = 'flex';
      document.getElementById('workflow-title').textContent = wf.name + ' v' + wf.version;
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('dag-canvas').style.display = 'block';
      document.getElementById('context-editor').style.display = 'block';
      renderWorkflowList();
      drawDAG(wf, trace);
    }
  } catch (e) {
    toast('Could not load trace: ' + e.message, 'error');
  }
}

// --- Validate ---
async function validateWorkflow() {
  if (!selectedWorkflowId) return;
  try {
    const result = await api(`/workflows/${selectedWorkflowId}/validate`, { method: 'POST' });
    const box = document.getElementById('validation-box');
    if (result.valid) {
      box.innerHTML = '<div class="validation-result valid">Valid DAG</div>';
    } else {
      box.innerHTML = `<div class="validation-result invalid">
        Invalid:<ul>${result.errors.map(e => '<li>' + esc(e) + '</li>').join('')}</ul>
      </div>`;
    }
  } catch (e) {
    toast(e.message, 'error');
  }
}

// --- Run workflow ---
async function executeRun() {
  if (!selectedWorkflowId) return;
  const errEl = document.getElementById('run-error');
  let ctx;
  try {
    ctx = JSON.parse(document.getElementById('run-context').value);
  } catch (e) {
    errEl.textContent = 'Invalid JSON: ' + e.message;
    errEl.style.display = 'block';
    return;
  }
  const sandbox = document.getElementById('run-sandbox').checked;
  try {
    const { run_id } = await api(`/workflows/${selectedWorkflowId}/run`, {
      method: 'POST',
      body: JSON.stringify({ initial_context: ctx, sandbox_mode: sandbox }),
    });
    closeModal('run-modal');
    toast('Run started: ' + run_id.slice(0, 8) + '...', 'success');
    // Start polling
    pollRun(run_id);
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}

function pollRun(runId) {
  if (pollTimer) clearInterval(pollTimer);
  let attempts = 0;
  pollTimer = setInterval(async () => {
    attempts++;
    try {
      const run = await api(`/runs/${runId}`);
      // Update runs list
      const idx = runs.findIndex(r => r.run_id === runId);
      if (idx >= 0) runs[idx] = run; else runs.push(run);
      renderRunList();
      if (run.status === 'completed' || run.status === 'failed') {
        clearInterval(pollTimer);
        pollTimer = null;
        selectRun(runId);
        toast(`Run ${run.status}`, run.status === 'completed' ? 'success' : 'error');
        if (statsVisible) fetchStats();
      }
    } catch (e) {
      if (attempts > 30) { clearInterval(pollTimer); pollTimer = null; }
    }
  }, 500);
}

// --- Trace rendering ---
function clearTrace() {
  document.getElementById('trace-list').innerHTML =
    '<div class="empty-state" style="font-size:12px;padding:20px">Run a workflow to see the execution trace</div>';
}

function renderTrace(trace, fullRun = null) {
  const el = document.getElementById('trace-list');
  if (!trace.nodes || trace.nodes.length === 0) {
    el.innerHTML = '<div class="empty-state" style="font-size:12px;padding:20px">No trace data</div>';
    return;
  }
  const nodeRuns = fullRun ? fullRun.node_runs || {} : {};
  el.innerHTML = trace.nodes.map((n, i) => {
    const last = i === trace.nodes.length - 1;
    const dur = n.duration_ms != null ? n.duration_ms.toFixed(0) + 'ms' : '';
    const branch = n.branch_taken ? `<span class="branch-badge">${esc(n.branch_taken)}</span>` : '';
    const attempts = n.attempts > 1 ? ` | ${n.attempts} attempts` : '';
    const startTime = n.started_at ? n.started_at.replace(/^.*T/, '').replace(/\+.*$/, '') : '';
    const nr = nodeRuns[n.node_id];
    let details = '';
    if (nr) {
      const sections = [];
      if (n.started_at || n.completed_at) sections.push({ label: 'Timing', data: { started_at: n.started_at, completed_at: n.completed_at, duration_ms: n.duration_ms } });
      if (nr.input) sections.push({ label: 'Input', data: nr.input });
      if (nr.output) sections.push({ label: 'Output', data: nr.output });
      if (nr.error) sections.push({ label: 'Error', data: nr.error });
      if (sections.length > 0) {
        const uid = 'detail-' + n.node_id.replace(/[^a-zA-Z0-9]/g, '_') + '-' + i;
        details = `<div class="trace-toggle" onclick="toggleDetail('${uid}')">Show details</div>
          <div class="trace-detail" id="${uid}" style="display:none">${sections.map(s =>
            `<div class="detail-section"><span class="detail-label">${s.label}</span><pre class="detail-json">${esc(typeof s.data === 'string' ? s.data : JSON.stringify(s.data, null, 2))}</pre></div>`
          ).join('')}</div>`;
      }
    }
    return `<div class="trace-node" data-node-id="${esc(n.node_id)}">
      <div class="trace-line">
        <div class="trace-dot ${n.status}"></div>
        ${last ? '' : '<div class="trace-connector"></div>'}
      </div>
      <div class="trace-info">
        <div class="node-label">${esc(n.node_id)}${branch}</div>
        <div class="node-meta">${n.status}${dur ? ' | ' + dur : ''}${attempts}${startTime ? ' | ' + startTime : ''}</div>
        ${details}
      </div>
    </div>`;
  }).join('');

  // Attach hover handlers
  el.querySelectorAll('.trace-node[data-node-id]').forEach(row => {
    row.addEventListener('mouseenter', () => {
      highlightedNodeId = row.dataset.nodeId;
      row.classList.add('highlight');
      if (lastDAGArgs.wf) drawDAG(lastDAGArgs.wf, lastDAGArgs.trace);
    });
    row.addEventListener('mouseleave', () => {
      highlightedNodeId = null;
      row.classList.remove('highlight');
      if (lastDAGArgs.wf) drawDAG(lastDAGArgs.wf, lastDAGArgs.trace);
    });
  });
}

function toggleDetail(id) {
  const el = document.getElementById(id);
  const toggle = el.previousElementSibling;
  if (el.style.display === 'none') {
    el.style.display = 'block';
    toggle.textContent = 'Hide details';
  } else {
    el.style.display = 'none';
    toggle.textContent = 'Show details';
  }
}

// --- DAG Drawing ---
function drawDAG(wf, trace = null) {
  lastDAGArgs = { wf, trace };
  const canvas = document.getElementById('dag-canvas');
  const wrap = document.getElementById('canvas-wrap');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = wrap.clientWidth * dpr;
  canvas.height = wrap.clientHeight * dpr;
  canvas.style.width = wrap.clientWidth + 'px';
  canvas.style.height = wrap.clientHeight + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;
  ctx.clearRect(0, 0, W, H);

  const nodes = wf.nodes;
  const nodeIds = Object.keys(nodes);
  if (nodeIds.length === 0) return;

  // Build adjacency for layout
  const children = {};
  const parents = {};
  nodeIds.forEach(id => { children[id] = []; parents[id] = []; });

  nodeIds.forEach(id => {
    const n = nodes[id];
    if (n.type === 'third_party' && n.next) {
      children[id].push({ target: n.next, label: '' });
      parents[n.next].push(id);
    } else if (n.type === 'branch') {
      (n.edges || []).forEach(e => {
        children[id].push({ target: e.next, label: e.label });
        parents[e.next].push(id);
      });
      if (n.default_next) {
        children[id].push({ target: n.default_next, label: 'default' });
        parents[n.default_next].push(id);
      }
    }
  });

  // Topological layering via BFS from start_node_id
  const layers = [];
  const layerOf = {};
  const visited = new Set();
  let queue = [wf.start_node_id];
  visited.add(wf.start_node_id);
  while (queue.length > 0) {
    layers.push(queue);
    queue.forEach(id => layerOf[id] = layers.length - 1);
    const next = [];
    queue.forEach(id => {
      children[id].forEach(({ target }) => {
        if (!visited.has(target)) {
          visited.add(target);
          next.push(target);
        }
      });
    });
    queue = next;
  }
  // Add any orphans
  nodeIds.forEach(id => {
    if (!visited.has(id)) {
      layers.push([id]);
      layerOf[id] = layers.length - 1;
    }
  });

  // Position nodes
  const nodeW = 150;
  const nodeH = 40;
  const layerGap = 80;
  const nodeGap = 30;
  const totalH = layers.length * nodeH + (layers.length - 1) * layerGap;
  const startY = Math.max(30, (H - totalH) / 2);

  const pos = {};
  layers.forEach((layer, li) => {
    const totalW = layer.length * nodeW + (layer.length - 1) * nodeGap;
    const startX = (W - totalW) / 2;
    layer.forEach((id, ni) => {
      pos[id] = {
        x: startX + ni * (nodeW + nodeGap),
        y: startY + li * (nodeH + layerGap),
      };
    });
  });

  // Build trace lookup
  const traceLookup = {};
  if (trace && trace.nodes) {
    trace.nodes.forEach(n => traceLookup[n.node_id] = n);
  }

  // Draw edges
  ctx.lineWidth = 1.5;
  nodeIds.forEach(id => {
    const from = pos[id];
    if (!from) return;
    children[id].forEach(({ target, label }) => {
      const to = pos[target];
      if (!to) return;
      const fromX = from.x + nodeW / 2;
      const fromY = from.y + nodeH;
      const toX = to.x + nodeW / 2;
      const toY = to.y;

      // Check if this edge was taken in trace
      const traceNode = traceLookup[id];
      const edgeTaken = traceNode && (
        (traceNode.branch_taken === label && label) ||
        (nodes[id].type === 'third_party' && traceNode.status === 'success')
      );

      ctx.strokeStyle = edgeTaken ? '#6c8cff' : '#3a3f52';
      ctx.lineWidth = edgeTaken ? 2.5 : 1.5;
      ctx.beginPath();
      ctx.moveTo(fromX, fromY);
      // Curved edge
      const midY = (fromY + toY) / 2;
      ctx.bezierCurveTo(fromX, midY, toX, midY, toX, toY);
      ctx.stroke();

      // Arrow
      const angle = Math.atan2(toY - midY, toX - toX) || Math.PI / 2;
      const arrowSize = 6;
      ctx.fillStyle = ctx.strokeStyle;
      ctx.beginPath();
      ctx.moveTo(toX, toY);
      ctx.lineTo(toX - arrowSize * Math.cos(angle - 0.4), toY - arrowSize * Math.sin(angle - 0.4));
      ctx.lineTo(toX - arrowSize * Math.cos(angle + 0.4), toY - arrowSize * Math.sin(angle + 0.4));
      ctx.fill();

      // Edge label
      if (label) {
        ctx.font = '10px -apple-system, sans-serif';
        ctx.fillStyle = '#8b90a0';
        const lx = (fromX + toX) / 2 + (fromX === toX ? 12 : 0);
        const ly = midY - 4;
        ctx.fillText(label, lx, ly);
      }
    });
  });

  // Draw nodes
  nodeIds.forEach(id => {
    const p = pos[id];
    if (!p) return;
    const n = nodes[id];
    const tn = traceLookup[id];

    // Node color by type
    let bg, border;
    if (n.type === 'third_party') { bg = '#1a2744'; border = '#3b6cf5'; }
    else if (n.type === 'branch') { bg = '#2a2314'; border = '#d4a017'; }
    else { bg = '#142a1a'; border = '#3cb371'; }

    // Override with trace status color
    if (tn) {
      if (tn.status === 'success') { bg = '#0f2a1a'; border = '#4ade80'; }
      else if (tn.status === 'failed') { bg = '#2a0f0f'; border = '#f87171'; }
      else if (tn.status === 'running') { bg = '#2a2314'; border = '#fbbf24'; }
    }

    // Rounded rect
    const r = 8;
    ctx.fillStyle = bg;
    ctx.strokeStyle = border;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(p.x + r, p.y);
    ctx.lineTo(p.x + nodeW - r, p.y);
    ctx.quadraticCurveTo(p.x + nodeW, p.y, p.x + nodeW, p.y + r);
    ctx.lineTo(p.x + nodeW, p.y + nodeH - r);
    ctx.quadraticCurveTo(p.x + nodeW, p.y + nodeH, p.x + nodeW - r, p.y + nodeH);
    ctx.lineTo(p.x + r, p.y + nodeH);
    ctx.quadraticCurveTo(p.x, p.y + nodeH, p.x, p.y + nodeH - r);
    ctx.lineTo(p.x, p.y + r);
    ctx.quadraticCurveTo(p.x, p.y, p.x + r, p.y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Highlight glow on hover
    if (highlightedNodeId === id) {
      ctx.save();
      ctx.shadowColor = '#6c8cff';
      ctx.shadowBlur = 18;
      ctx.strokeStyle = '#6c8cff';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(p.x + r, p.y);
      ctx.lineTo(p.x + nodeW - r, p.y);
      ctx.quadraticCurveTo(p.x + nodeW, p.y, p.x + nodeW, p.y + r);
      ctx.lineTo(p.x + nodeW, p.y + nodeH - r);
      ctx.quadraticCurveTo(p.x + nodeW, p.y + nodeH, p.x + nodeW - r, p.y + nodeH);
      ctx.lineTo(p.x + r, p.y + nodeH);
      ctx.quadraticCurveTo(p.x, p.y + nodeH, p.x, p.y + nodeH - r);
      ctx.lineTo(p.x, p.y + r);
      ctx.quadraticCurveTo(p.x, p.y, p.x + r, p.y);
      ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }

    // Type icon
    let icon = '';
    if (n.type === 'third_party') icon = '\u25B6';
    else if (n.type === 'branch') icon = '\u25C7';
    else icon = '\u25CF';

    ctx.font = '12px -apple-system, sans-serif';
    ctx.fillStyle = border;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(icon, p.x + 10, p.y + nodeH / 2);

    // Label
    ctx.fillStyle = '#e1e4ed';
    ctx.font = '12px -apple-system, sans-serif';
    const maxLabelW = nodeW - 32;
    let label = n.label;
    while (ctx.measureText(label).width > maxLabelW && label.length > 3) {
      label = label.slice(0, -1);
    }
    if (label !== n.label) label += '\u2026';
    ctx.fillText(label, p.x + 26, p.y + nodeH / 2);
    ctx.textAlign = 'start';
  });
}

// --- Utility ---
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- Resize handler ---
window.addEventListener('resize', () => {
  if (lastDAGArgs.wf) {
    drawDAG(lastDAGArgs.wf, lastDAGArgs.trace);
  } else if (selectedWorkflowId && workflows[selectedWorkflowId]) {
    drawDAG(workflows[selectedWorkflowId]);
  }
});

// --- Stats panel ---
let statsVisible = false;

function toggleStats() {
  statsVisible = !statsVisible;
  const panel = document.getElementById('stats-panel');
  const btn = document.getElementById('stats-toggle');
  panel.classList.toggle('visible', statsVisible);
  btn.classList.toggle('active', statsVisible);
  if (statsVisible) fetchStats();
}

async function fetchStats() {
  try {
    const data = await api('/stats');
    renderStats(data);
  } catch (e) { /* server may not be running */ }
}

function renderStats(data) {
  const bar = document.getElementById('stats-bar');

  // Success rate color
  const rate = data.runs.success_rate;
  let rateClass = 'green';
  if (rate < 70) rateClass = 'red';
  else if (rate < 90) rateClass = 'yellow';

  let html = `
    <div class="stat-card">
      <div class="stat-label">Runs</div>
      <div class="stat-value">${data.totals.runs}</div>
      <div class="stat-sub">${data.runs.completed} passed / ${data.runs.failed} failed</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Success Rate</div>
      <div class="stat-value ${rateClass}">${rate.toFixed(1)}%</div>
      <div class="stat-sub">${data.runs.completed + data.runs.failed} finished</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Latency</div>
      <div class="stat-value">${data.latency.avg_ms.toFixed(0)}<span style="font-size:12px;font-weight:400">ms</span></div>
      <div class="stat-sub">p95 ${data.latency.p95_ms.toFixed(0)}ms / max ${data.latency.max_ms.toFixed(0)}ms</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Retries</div>
      <div class="stat-value">${data.totals.retries}</div>
      <div class="stat-sub">${data.totals.nodes_succeeded} nodes ok / ${data.totals.nodes_failed} failed</div>
    </div>`;

  // Per-workflow table
  const wfKeys = Object.keys(data.per_workflow);
  if (wfKeys.length > 0) {
    html += `<div class="stat-card" style="min-width:200px">
      <div class="stat-label">Per Workflow</div>
      <table class="per-wf-table">
        <tr><th>Workflow</th><th>Runs</th><th>Pass</th><th>Avg ms</th></tr>`;
    wfKeys.forEach(wfId => {
      const w = data.per_workflow[wfId];
      html += `<tr>
        <td>${esc(wfId)}</td>
        <td>${w.runs}</td>
        <td>${w.completed}/${w.runs}</td>
        <td>${w.avg_latency_ms.toFixed(0)}</td>
      </tr>`;
    });
    html += `</table></div>`;
  }

  bar.innerHTML = html;
}

// --- Init ---
fetchWorkflows();
fetchRuns();
</script>
</body>
